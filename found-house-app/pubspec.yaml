name: found_house_app
description: "个人扫楼助手 MVP 移动端（本地优先，弱网/无网可用）。"
# MVP 不发布到 pub.dev，防止误发布。
publish_to: "none"
version: 1.0.0+1

# SDK 约束：Dart 3.x / Flutter 3.x 稳定线。
# 下限取 Dart 3.6 / Flutter 3.27（go_router 15.2.x 要求 Dart>=3.6）。
# 用户安装最新稳定 Flutter 后可直接 `flutter pub get`，caret 约束允许解析到更新的兼容版本。
environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

# 版本查证说明（2026-07，pub.dev 与 WebFetch/WebSearch/curl 在本机被网络策略拦截，
# 统一改用 context7 MCP 检索 pub.dev / 官方文档确认，来源逐条注明）：
dependencies:
  flutter:
    sdk: flutter

  # 状态管理。查证：context7 pub.dev/flutter_riverpod，当前稳定 3.3.0。
  flutter_riverpod: ^2.6.1

  # 路由。查证：context7 pub.dev/go_router/versions，15.2.x（需 Dart>=3.6）。
  go_router: ^17.3.0

  # 本地数据库。查证：drift.simonbinder.eu/setup，当前 2.34.0。
  drift: ^2.34.0

  # SQLite 原生库（打包进 Android/iOS，与 drift NativeDatabase 搭配）。
  # 采用经典稳定路径（drift + sqlite3_flutter_libs + path_provider），
  # 不用 drift_flutter（当前仅 0.3.1-wip 预发布版）。
  sqlite3_flutter_libs: ^0.6.0+eol

  # 文件路径。查证：drift.simonbinder.eu/setup，2.1.5。
  path_provider: ^2.1.6
  path: ^1.9.1

  # 拍照/选图。MVP 先用 image_picker，camera 依赖后置（见 UI §10）。
  image_picker: ^1.2.3

  # 运行时权限。查证：context7 pub.dev/permission_handler/install，12.0.1。
  permission_handler: ^12.0.3

  # PDF 生成（dart_pdf）。查证：context7 davbfr/dart_pdf，pdf 3.11.x 稳定线。
  pdf: ^3.13.0

  # 打印/分享/预览。查证：context7 pub.dev/printing/example，5.13.3。
  printing: ^5.15.0

  # 平台安全存储（Keychain / Keystore），用于托管字段级加密 DEK（技术方案 §5.2）。
  flutter_secure_storage: ^10.3.1

  # UUID 主键生成（房源/照片/检查项等，取 v4）。查证：context7 pub.dev/uuid，4.x 稳定线。
  uuid: ^4.5.3
  cryptography: ^2.9.0
  sqlite3: ^3.3.4

  # HMAC-SHA1 签名（阿里云 OSS PostObject 端侧直传 policy 签名）。
  # 原为 cryptography 等的传递依赖，此处提升为直接依赖。查证：pubspec.lock 3.0.7。
  crypto: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter

  integration_test:
    sdk: flutter

  # Drift 代码生成，版本与 drift 对齐。查证：drift.simonbinder.eu/setup。
  drift_dev: ^2.34.1+1

  # 构建/代码生成运行器。查证：drift.simonbinder.eu/setup，2.15.0。
  build_runner: ^2.15.0

  # 官方 lint 规则集。查证：context7 pub.dev/flutter_lints，5.0.0。
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  # 资源目录在后续里程碑按需启用：
  # assets:
  #   - assets/checklist/
