# Drift 代码生成配置。
#
# 职责边界（W1-2 · D1，冻结项 F9）：统一 Drift 的 Dart→SQL 列名映射策略，
# 使 tables.dart 中的 lowerCamelCase 属性自动生成 snake_case 存储列名，
# 与字段字典（docs/field-dictionary.md）逐字段对齐，避免逐列手写 .named()。
#
# 生成命令（需本机安装 Flutter/Dart 稳定线后执行）：
#   dart run build_runner build --delete-conflicting-outputs
targets:
  $default:
    builders:
      drift_dev:
        options:
          # Dart 属性 rentMonthly → SQL 列 rent_monthly。
          case_from_dart_to_sql: snake_case
          # 生成的数据类使用可空类型精确匹配 .nullable() 声明。
          named_parameters: true
